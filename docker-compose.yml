version: '3.8'

services:
  yourownpersonaldj:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yourownpersonaldj
    ports:
      - "3000:3000"
    volumes:
      # Mount your music directory here
      - ./music:/app/music:ro
      # Persist the library cache database
      - yourownpersonaldj_data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - MUSIC_DIR=/app/music
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  yourownpersonaldj_data:
    driver: local
